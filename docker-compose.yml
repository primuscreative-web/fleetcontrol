services:
  postgres:
    image: postgres:16-alpine
    container_name: fleetcontrol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleetcontrol
      POSTGRES_PASSWORD: fleetcontrol
      POSTGRES_DB: fleetcontrol
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetcontrol -d fleetcontrol"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fleetcontrol-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
